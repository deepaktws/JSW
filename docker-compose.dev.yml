services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d appdb']
      interval: 5s
      timeout: 5s
      retries: 10

  excel-ml:
    build:
      context: ./excel-ml
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      MODEL_PATH: /app/models/model.joblib
      OUTPUT_DIR: /app/output
    volumes:
      - ./excel-ml/app:/app/app
      - excel_ml_models_dev:/app/models
      - excel_ml_output_dev:/app/output
    command:
      [
        'uvicorn',
        'app.main:app',
        '--host',
        '0.0.0.0',
        '--port',
        '8000',
        '--reload',
      ]
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 25s

  server:
    image: node:20-alpine
    working_dir: /app
    ports:
      - '5050:5050'
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/appdb?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-use-strong-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 5050
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: '100'
      FASTAPI_URL: http://excel-ml:8000
      FASTAPI_TIMEOUT_MS: ${FASTAPI_TIMEOUT_MS:-120000}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      excel-ml:
        condition: service_healthy
    entrypoint: ['sh', '-c']
    command:
      - |
        apk add --no-cache openssl libc6-compat python3 make g++
        npm install
        npx prisma generate
        npx prisma migrate deploy
        npx prisma db seed
        npm run dev

  client:
    image: node:20-alpine
    working_dir: /app
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5050}
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: '100'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - server
    entrypoint: ['sh', '-c']
    command:
      - |
        npm install
        npm run dev

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
  excel_ml_models_dev:
  excel_ml_output_dev:
