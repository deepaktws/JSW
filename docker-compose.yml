services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d appdb']
      interval: 5s
      timeout: 5s
      retries: 10

  excel-ml:
    build:
      context: ./excel-ml
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      MODEL_PATH: /app/models/model.joblib
      OUTPUT_DIR: /app/output
    volumes:
      - excel_ml_models:/app/models
      - excel_ml_output:/app/output
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5050:5050'
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/appdb?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-use-strong-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 5050
      NODE_ENV: production
      FASTAPI_URL: http://excel-ml:8000
      FASTAPI_TIMEOUT_MS: ${FASTAPI_TIMEOUT_MS:-120000}
    depends_on:
      postgres:
        condition: service_healthy
      excel-ml:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:5050/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  client:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5050}
    ports:
      - '5173:5173'
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:
  excel_ml_models:
  excel_ml_output:
