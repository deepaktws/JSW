services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d appdb']
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5050:5050'
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/appdb?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-use-strong-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 5050
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:5050/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  client:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5050}
    ports:
      - '5173:5173'
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:
